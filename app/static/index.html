<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>IIT Dokumentassistent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f1ec;
      --surface: #ffffff;
      --surface-alt: #faf8f5;
      --border: #e2ddd5;
      --border-light: #ece8e1;
      --text: #2c2825;
      --text-secondary: #6b6560;
      --text-tertiary: #9b9590;
      --accent: #3d6b5e;
      --accent-light: #e8f0ed;
      --accent-hover: #2d5448;
      --user-bg: #3d6b5e;
      --user-text: #ffffff;
      --source-bg: #faf8f5;
      --source-border: #e8e4de;
      --ref-color: #3d6b5e;
      --shadow-sm: 0 1px 2px rgba(44,40,37,0.06);
      --shadow-md: 0 2px 8px rgba(44,40,37,0.08);
      --radius: 10px;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --font-serif: 'Source Serif 4', Georgia, serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px 24px 16px;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }

    header h1 {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .new-session-btn {
      font: inherit;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-secondary);
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .new-session-btn:hover {
      color: var(--text);
      border-color: var(--text-tertiary);
    }

    main {
      flex: 1;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
      padding: 0 24px 120px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .welcome {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }

    .welcome h2 {
      font-family: var(--font-serif);
      font-size: 1.2rem;
      font-weight: 400;
      margin-bottom: 8px;
      color: var(--text-tertiary);
    }

    .welcome p {
      font-size: 0.9rem;
      line-height: 1.5;
    }

    /* Messages */
    .msg {
      max-width: 100%;
      animation: msgIn 0.25s ease-out;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      align-self: flex-end;
      max-width: 72%;
      margin-left: auto;
    }

    .msg.user .bubble {
      background: var(--user-bg);
      color: var(--user-text);
      padding: 12px 16px;
      border-radius: var(--radius) var(--radius) 4px var(--radius);
      font-size: 0.92rem;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .msg.assistant .bubble {
      background: var(--surface);
      border: 1px solid var(--border-light);
      padding: 18px 20px;
      border-radius: 4px var(--radius) var(--radius) var(--radius);
      box-shadow: var(--shadow-sm);
    }

    .answer-text {
      font-family: var(--font-serif);
      font-size: 0.95rem;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .answer-text .source-ref {
      display: inline-block;
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--ref-color);
      background: var(--accent-light);
      padding: 1px 5px;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      vertical-align: baseline;
      transition: background 0.15s;
    }

    .answer-text .source-ref:hover {
      background: #d4e5df;
    }

    /* Loading indicator */
    .loading {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 20px;
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: 4px var(--radius) var(--radius) var(--radius);
      box-shadow: var(--shadow-sm);
    }

    .loading-dots {
      display: flex;
      gap: 4px;
    }

    .loading-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-tertiary);
      animation: dotPulse 1.2s ease-in-out infinite;
    }

    .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes dotPulse {
      0%, 60%, 100% { opacity: 0.3; transform: scale(0.85); }
      30% { opacity: 1; transform: scale(1); }
    }

    .loading-text {
      font-size: 0.85rem;
      color: var(--text-tertiary);
    }

    /* Sources */
    .sources-section {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border-light);
    }

    .sources-header {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .source-card {
      margin-bottom: 8px;
      padding: 10px 12px;
      background: var(--source-bg);
      border: 1px solid var(--source-border);
      border-radius: 8px;
      transition: border-color 0.15s;
    }

    .source-card.highlight {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent-light);
    }

    .source-card-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 4px;
    }

    .source-badge {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--ref-color);
      background: var(--accent-light);
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .source-filename {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
    }

    .source-filename a {
      color: var(--ref-color);
      text-decoration: none;
    }

    .source-filename a:hover {
      text-decoration: underline;
    }

    .source-meta {
      font-size: 0.78rem;
      color: var(--text-tertiary);
      margin-bottom: 6px;
    }

    .source-snippet {
      font-size: 0.82rem;
      color: var(--text-secondary);
      line-height: 1.5;
      display: none;
    }

    .source-card.expanded .source-snippet {
      display: block;
    }

    .source-toggle {
      font-size: 0.78rem;
      color: var(--text-tertiary);
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      padding: 2px 0;
    }

    .source-toggle:hover {
      color: var(--text-secondary);
    }

    /* Debug */
    .debug-toggle {
      margin-top: 10px;
    }

    .debug-toggle summary {
      cursor: pointer;
      font-size: 0.78rem;
      color: var(--text-tertiary);
      list-style: none;
    }

    .debug-toggle summary::-webkit-details-marker { display: none; }
    .debug-toggle summary::before {
      content: "▸ ";
    }
    .debug-toggle[open] summary::before {
      content: "▾ ";
    }

    .debug-content {
      margin-top: 8px;
      padding: 10px 12px;
      background: var(--surface-alt);
      border-radius: 6px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.72rem;
      line-height: 1.5;
      color: var(--text-secondary);
      overflow-x: auto;
      white-space: pre-wrap;
    }

    /* Input area */
    .input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, var(--bg) 20%);
      padding: 16px 24px 20px;
    }

    .input-inner {
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .input-inner textarea {
      flex: 1;
      min-height: 48px;
      max-height: 160px;
      resize: none;
      padding: 12px 14px;
      font: inherit;
      font-size: 0.92rem;
      line-height: 1.45;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      box-shadow: var(--shadow-md);
      outline: none;
      transition: border-color 0.15s;
    }

    .input-inner textarea:focus {
      border-color: var(--accent);
    }

    .input-inner textarea::placeholder {
      color: var(--text-tertiary);
    }

    .send-btn {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
      box-shadow: var(--shadow-sm);
    }

    .send-btn:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .send-btn svg {
      width: 18px;
      height: 18px;
    }

    /* Footer */
    .powered-by {
      font-size: 0.7rem;
      color: var(--text-tertiary);
      text-align: center;
      margin-top: 4px;
      letter-spacing: 0.02em;
    }

    @media (max-width: 640px) {
      header { padding: 16px 16px 12px; }
      header h1 { font-size: 1.25rem; }
      main { padding: 0 16px 110px; }
      .msg.user { max-width: 85%; }
      .input-area { padding: 12px 16px 16px; }
      .welcome { padding: 40px 12px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>IIT Dokumentassistent</h1>
    <div class="header-actions">
      <button class="new-session-btn" id="new-session-btn" title="Ny session">Ny session</button>
    </div>
  </header>

  <main id="chat">
    <div class="welcome" id="welcome">
      <h2>Ställ en fråga om interna styrdokument</h2>
      <p>Fråga om regler, rutiner, beslut och processer.</p>
    </div>
  </main>

  <div class="input-area">
    <form class="input-inner" id="chat-form">
      <textarea id="question" placeholder="Ställ en fråga..." rows="1"></textarea>
      <button class="send-btn" id="send-btn" type="submit" title="Skicka">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </button>
    </form>
    <div class="powered-by">Drivs av URD</div>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const form = document.getElementById("chat-form");
    const questionInput = document.getElementById("question");
    const sendBtn = document.getElementById("send-btn");
    const welcome = document.getElementById("welcome");
    const newSessionBtn = document.getElementById("new-session-btn");

    let sessionId = null;

    // Auto-resize textarea
    questionInput.addEventListener("input", () => {
      questionInput.style.height = "auto";
      questionInput.style.height = Math.min(questionInput.scrollHeight, 160) + "px";
    });

    // Enter to send, Shift+Enter for newline
    questionInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        form.dispatchEvent(new Event("submit"));
      }
    });

    // New session
    newSessionBtn.addEventListener("click", () => {
      sessionId = null;
      chat.innerHTML = "";
      chat.appendChild(welcome);
      welcome.style.display = "";
      questionInput.focus();
    });

    function buildDocumentUrl(sourcePath) {
      if (!sourcePath) return null;
      // source_path kan vara absolut eller relativ.
      // Hitta "docs/" i sökvägen och ta allt efter det.
      const docsIdx = sourcePath.indexOf("/docs/");
      if (docsIdx >= 0) {
        const relPath = sourcePath.slice(docsIdx + 6); // efter "/docs/"
        return "/document?path=" + encodeURIComponent(relPath);
      }
      // Om sökvägen börjar med "docs/"
      if (sourcePath.startsWith("docs/")) {
        const relPath = sourcePath.slice(5);
        return "/document?path=" + encodeURIComponent(relPath);
      }
      return null;
    }

    function linkSourceRefs(text) {
      // Replace [Källa N] with clickable spans
      return text.replace(
        /\[Källa\s+(\d+)\]/g,
        (match, num) =>
          `<span class="source-ref" data-source="${num}" title="Visa källa ${num}">${match}</span>`
      );
    }

    function addUserMessage(text) {
      welcome.style.display = "none";

      const wrap = document.createElement("div");
      wrap.className = "msg user";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;
      wrap.appendChild(bubble);

      chat.appendChild(wrap);
      scrollToBottom();
    }

    function addLoading() {
      const wrap = document.createElement("div");
      wrap.className = "msg assistant";
      wrap.id = "loading-msg";

      const loading = document.createElement("div");
      loading.className = "loading";

      const dots = document.createElement("div");
      dots.className = "loading-dots";
      dots.innerHTML = "<span></span><span></span><span></span>";
      loading.appendChild(dots);

      const loadText = document.createElement("div");
      loadText.className = "loading-text";
      loadText.textContent = "Söker i dokumenten...";
      loading.appendChild(loadText);

      wrap.appendChild(loading);
      chat.appendChild(wrap);
      scrollToBottom();
    }

    function removeLoading() {
      const el = document.getElementById("loading-msg");
      if (el) el.remove();
    }

    function addAssistantMessage(text, sources, debug) {
      const wrap = document.createElement("div");
      wrap.className = "msg assistant";

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      // Answer text with linked source references
      const textDiv = document.createElement("div");
      textDiv.className = "answer-text";
      textDiv.innerHTML = linkSourceRefs(escapeHtml(text));
      bubble.appendChild(textDiv);

      // Sources
      if (sources && sources.length) {
        const section = document.createElement("div");
        section.className = "sources-section";

        const header = document.createElement("div");
        header.className = "sources-header";
        header.textContent = `${sources.length} käll${sources.length === 1 ? "a" : "or"}`;
        section.appendChild(header);

        sources.forEach((s, i) => {
          const card = document.createElement("div");
          card.className = "source-card";
          card.id = `source-${i + 1}-${Date.now()}`;
          card.dataset.sourceNum = i + 1;

          const cardHeader = document.createElement("div");
          cardHeader.className = "source-card-header";

          const badge = document.createElement("span");
          badge.className = "source-badge";
          badge.textContent = `Källa ${i + 1}`;
          cardHeader.appendChild(badge);

          const filename = document.createElement("span");
          filename.className = "source-filename";

          // Bygg dokumentlänk från source_path
          const docUrl = buildDocumentUrl(s.metadata.source_path);
          if (docUrl) {
            const link = document.createElement("a");
            link.href = docUrl;
            link.target = "_blank";
            link.rel = "noopener";
            link.title = "Öppna originaldokument";
            link.textContent = s.metadata.file_name || "(okänd fil)";
            filename.appendChild(link);
          } else {
            filename.textContent = s.metadata.file_name || "(okänd fil)";
          }
          cardHeader.appendChild(filename);

          card.appendChild(cardHeader);

          const meta = document.createElement("div");
          meta.className = "source-meta";
          const parts = [];
          if (s.metadata.section_title) parts.push(s.metadata.section_title);
          if (s.score != null) parts.push(`score ${Number(s.score).toFixed(2)}`);
          meta.textContent = parts.join(" · ");
          card.appendChild(meta);

          const snippet = document.createElement("div");
          snippet.className = "source-snippet";
          // Strip contextual prefix for cleaner display
          let snippetText = s.text || "";
          const sepIdx = snippetText.indexOf("---\n");
          if (sepIdx >= 0 && sepIdx < 200) {
            snippetText = snippetText.slice(sepIdx + 4);
          }
          snippet.textContent = snippetText.slice(0, 400);
          if (snippetText.length > 400) snippet.textContent += "...";
          card.appendChild(snippet);

          const toggle = document.createElement("button");
          toggle.className = "source-toggle";
          toggle.textContent = "Visa text";
          toggle.addEventListener("click", () => {
            card.classList.toggle("expanded");
            toggle.textContent = card.classList.contains("expanded") ? "Dölj text" : "Visa text";
          });
          card.appendChild(toggle);

          section.appendChild(card);
        });

        bubble.appendChild(section);

        // Make source refs clickable -> scroll to & highlight source
        setTimeout(() => {
          textDiv.querySelectorAll(".source-ref").forEach((ref) => {
            ref.addEventListener("click", () => {
              const num = ref.dataset.source;
              const cards = section.querySelectorAll(".source-card");
              cards.forEach((c) => c.classList.remove("highlight"));
              const target = [...cards].find(
                (c) => c.dataset.sourceNum === num
              );
              if (target) {
                target.classList.add("highlight");
                target.classList.add("expanded");
                const toggleBtn = target.querySelector(".source-toggle");
                if (toggleBtn) toggleBtn.textContent = "Dölj text";
                target.scrollIntoView({ behavior: "smooth", block: "nearest" });
              }
            });
          });
        }, 0);
      }

      // Debug info
      if (debug) {
        const details = document.createElement("details");
        details.className = "debug-toggle";

        const summary = document.createElement("summary");
        const timing = debug.timing_s || {};
        summary.textContent = `Teknisk info — ${(timing.total || 0).toFixed(1)}s`;
        details.appendChild(summary);

        // Curate debug: remove verbose evidence_json
        const cleanDebug = { ...debug };
        if (cleanDebug.synthesis) {
          cleanDebug.synthesis = { ...cleanDebug.synthesis };
          delete cleanDebug.synthesis.evidence_json;
        }

        const pre = document.createElement("pre");
        pre.className = "debug-content";
        pre.textContent = JSON.stringify(cleanDebug, null, 2);
        details.appendChild(pre);

        bubble.appendChild(details);
      }

      wrap.appendChild(bubble);
      chat.appendChild(wrap);
      scrollToBottom();
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
      });
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const question = questionInput.value.trim();
      if (!question) return;

      addUserMessage(question);
      questionInput.value = "";
      questionInput.style.height = "auto";
      sendBtn.disabled = true;
      addLoading();

      try {
        const payload = { question };
        if (sessionId) payload.session_id = sessionId;

        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        const data = await res.json();
        removeLoading();

        if (!res.ok) {
          addAssistantMessage(`Fel: ${data.detail || "okänt fel"}`, null, null);
        } else {
          if (data.session_id) sessionId = data.session_id;
          addAssistantMessage(data.answer, data.sources, data.debug);
        }
      } catch (err) {
        removeLoading();
        addAssistantMessage(`Kunde inte nå servern: ${err.message}`, null, null);
      } finally {
        sendBtn.disabled = false;
        questionInput.focus();
      }
    });

    questionInput.focus();
  </script>
</body>
</html>
